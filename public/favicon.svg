<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Open book icon -->
  <g transform="translate(32,34)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M0 -12 C-4 -12 -16 -14 -18 -12 L-18 12 C-16 10 -4 12 0 12"/>
    <!-- Right page -->
    <path d="M0 -12 C4 -12 16 -14 18 -12 L18 12 C16 10 4 12 0 12"/>
    <!-- Spine -->
    <line x1="0" y1="-12" x2="0" y2="12"/>
    <!-- Left lines -->
    <line x1="-14" y1="-7" x2="-4" y2="-7" stroke-width="1.5"/>
    <line x1="-14" y1="-2" x2="-4" y2="-2" stroke-width="1.5"/>
    <line x1="-14" y1="3" x2="-4" y2="3" stroke-width="1.5"/>
    <!-- Right lines -->
    <line x1="4" y1="-7" x2="14" y2="-7" stroke-width="1.5"/>
    <line x1="4" y1="-2" x2="14" y2="-2" stroke-width="1.5"/>
    <line x1="4" y1="3" x2="14" y2="3" stroke-width="1.5"/>
  </g>
</svg>
